{% extends "base.html" %}
{% block content %}

<div class="page-heading">
  <h3>📝 Journal Entry</h3>
</div>

<form method="post" class="card p-3">
  <div class="row g-2">
    <div class="col-12 col-md-3">
      <label class="form-label">Date</label>
      <input type="date" name="date" value="{{ today }}" class="form-control">
    </div>
    <div class="col-12">
      <label class="form-label">Narration</label>
      <input name="narration" class="form-control">
       <label class="form-label">Narration</label>
    </div>
  </div>

  <div class="row mt-3">
    <div class="col-12 col-md-6">
      <div
        style="font-weight:600;margin-bottom:8px;color:var(--text);font-size:13px;padding:6px 10px;background:rgba(239,68,68,0.08);border-left:3px solid var(--red);border-radius:4px">
        Debit</div>
      <div id="drRows">
        <div class="row g-2 mb-2">
          <div class="col-6">
            <select name="dr_ledger_id" class="form-control">
              <option value="">[Select Ledger]</option>
              {% for l in ledgers %}<option value="{{ l[0] }}">{{ l[1] }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-4">
            <select name="dr_acc_id" class="form-control">
              <option value="">[Select Account]</option>
              {% for a in accounts %}<option value="{{ a[0] }}">{{ a[1] }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-2">
            <input name="dr_amount" class="form-control drAmt" placeholder="Amount">
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-sm btn-secondary" onclick="addDr()">Add Debit Row</button>
    </div>
    <div class="col-12 col-md-6">
      <div
        style="font-weight:600;margin-bottom:8px;color:var(--text);font-size:13px;padding:6px 10px;background:rgba(34,197,94,0.08);border-left:3px solid var(--green);border-radius:4px">
        Credit</div>
      <div id="crRows">
        <div class="row g-2 mb-2">
          <div class="col-6">
            <select name="cr_ledger_id" class="form-control">
              <option value="">[Select Ledger]</option>
              {% for l in ledgers %}<option value="{{ l[0] }}">{{ l[1] }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-4">
            <select name="cr_acc_id" class="form-control">
              <option value="">[Select Account]</option>
              {% for a in accounts %}<option value="{{ a[0] }}">{{ a[1] }}</option>{% endfor %}
            </select>
          </div>
          <div class="col-2">
            <input name="cr_amount" class="form-control crAmt" placeholder="Amount">
          </div>
        </div>
      </div>
      <button type="button" class="btn btn-sm btn-secondary" onclick="addCr()">Add Credit Row</button>
    </div>
  </div>

  <div class="mt-3">
    <div>Total Dr: <span id="drTotal">0.00</span> | Total Cr: <span id="crTotal">0.00</span></div>
    <button class="btn btn-success mt-2" onclick="return confirmBalanced()">Save Journal</button>
  </div>
</form>

<hr>

<div class="page-heading" style="margin-top:20px">
  <h4>Recent Journals</h4>
</div>
<div class="table-responsive">
  <table class="table table-sm table-bordered">
    <thead>
      <tr>
        <th>No</th>
        <th>Date</th>
        <th>Narration</th>
        <th>Dr</th>
        <th>Cr</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ '%.2f'|format(r[3]) }}</td>
        <td>{{ '%.2f'|format(r[4]) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

<script>
  function addDr() {
    const tpl = document.querySelector('#drRows .row').cloneNode(true);
    tpl.querySelectorAll('input').forEach(i => i.value = '');
    tpl.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    document.getElementById('drRows').appendChild(tpl);
  }
  function addCr() {
    const tpl = document.querySelector('#crRows .row').cloneNode(true);
    tpl.querySelectorAll('input').forEach(i => i.value = '');
    tpl.querySelectorAll('select').forEach(s => s.selectedIndex = 0);
    document.getElementById('crRows').appendChild(tpl);
  }
  function calcTotals() {
    let dr = 0, cr = 0;
    document.querySelectorAll('.drAmt').forEach(i => { dr += parseFloat(i.value || 0) });
    document.querySelectorAll('.crAmt').forEach(i => { cr += parseFloat(i.value || 0) });
    document.getElementById('drTotal').innerText = dr.toFixed(2);
    document.getElementById('crTotal').innerText = cr.toFixed(2);
  }
  document.addEventListener('input', function (e) {
    if (e.target.classList.contains('drAmt') || e.target.classList.contains('crAmt')) calcTotals();
  });
  function confirmBalanced() {
    const dr = parseFloat(document.getElementById('drTotal').innerText);
    const cr = parseFloat(document.getElementById('crTotal').innerText);
    if (Math.abs(dr - cr) > 0.001) {
      alert('Debits and Credits must be equal.');
      return false;
    }
    return true;
  }
</script>

{% endblock %}
