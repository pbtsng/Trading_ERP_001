{% extends "base.html" %}

{% block content %}

<div class="page-heading">
  <h3>🧧 Receipt Entry</h3>
</div>

<form method="post" class="card p-3">
  <div class="row g-2">
    <div class="col-12 col-md-3">
      <label class="form-label">Date</label>
      <input type="date" name="date" value="{{ today }}" class="form-control">
    </div>
    <div class="col-12 col-md-3">
      <label class="form-label">Cash / Bank</label>
      <select name="ledger_id" class="form-control">
        {% for l in cash_bank %}
        <option value="{{ l[0] }}">{{ l[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">Party</label>
      <select name="acc_id" class="form-control">
        {% for a in parties %}
        <option value="{{ a[0] }}">{{ a[1] }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-2">
      <label class="form-label">Amount</label>
      <input name="amount" class="form-control" required placeholder="0.00">
    </div>
    <div class="col-12">
      <label class="form-label">Narration</label>
      <input name="narration" class="form-control" placeholder="Enter narration…">
    </div>
  </div>
  <div class="mt-3">
    <button class="btn btn-success">Save Receipt</button>
  </div>
  <div class="mt-2 text-muted small">
    Dr Cash/Bank, Cr Party
  </div>
</form>

<hr>

<div class="page-heading" style="margin-top:20px">
  <h4>Recent Receipts</h4>
</div>
<div class="table-responsive">
  <table class="table table-sm table-bordered">
    <thead>
      <tr>
        <th>No</th>
        <th>Date</th>
        <th>Narration</th>
        <th>Dr</th>
        <th>Cr</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ '%.2f'|format(r[3]) }}</td>
        <td>{{ '%.2f'|format(r[4]) }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
