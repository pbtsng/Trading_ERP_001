{% extends "base.html" %}
{% block content %}

<h3 class="mb-3">Search</h3>

<form method="get" class="card p-3 mb-3">
  <div class="row g-2 align-items-end">
    <div class="col-12 col-md-8">
      <label>What do you want to open?</label>
      <input name="q" value="{{ q }}" class="form-control" placeholder="Type form or report name...">
    </div>
    <div class="col-12 col-md-2">
      <button class="btn btn-primary w-100">Search</button>
    </div>
  </div>
</form>

{% if q %}
  <h5 class="mb-2">Results for "{{ q }}"</h5>
{% else %}
  <h5 class="mb-2">Popular pages</h5>
{% endif %}

<div class="list-group">
  {% for r in results %}
  <a href="{{ r.path }}" class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
    <div>
      <div class="fw-bold">{{ r.title }}</div>
      <div class="small text-muted">{{ r.path }}</div>
    </div>
    <span class="badge bg-secondary">{{ r.section }}</span>
  </a>
  {% endfor %}
  {% if not results %}
  <div class="list-group-item text-muted">No matching pages.</div>
  {% endif %}
</div>

{% endblock %}
