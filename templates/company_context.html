{% extends "base.html" %}
{% block content %}

<div class="page-heading">
  <h3>🏢 Company / Division / Year</h3>
</div>

<form method="post" class="card p-3 mb-3">
  <div class="row g-2">
    <div class="col-12 col-md-4">
      <label class="form-label">Company</label>
      <select name="company_id" class="form-control" onchange="this.form.submit()">
        {% for c in companies %}
        <option value="{{ c.company_id }}" {% if c.company_id==current_company_id %}selected{% endif %}>
          {{ c.company_name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">Division</label>
      <select name="division_id" class="form-control">
        <option value="">[All]</option>
        {% for d in divisions %}
        <option value="{{ d.division_id }}" {% if d.division_id==current_division_id %}selected{% endif %}>
          {{ d.division_name }}
        </option>
        {% endfor %}
      </select>
    </div>
    <div class="col-12 col-md-4">
      <label class="form-label">Financial Year</label>
      <select name="fy_id" class="form-control">
        {% for fy in years %}
        <option value="{{ fy.fy_id }}" {% if fy.fy_id==current_fy_id %}selected{% endif %}>
          {{ fy.fy_name }} ({{ fy.start_date }} - {{ fy.end_date }})
        </option>
        {% endfor %}
      </select>
    </div>
  </div>
  <div class="mt-3">
    <button class="btn btn-primary">Save Context</button>
  </div>
</form>

<div class="card p-3">
  <div><b>Current Company:</b> {{ current_company_name }}</div>
  <div><b>Current Division:</b> {{ current_division_name or '[All]' }}</div>
  <div><b>Current Year:</b> {{ current_fy_name }}</div>
</div>

{% endblock %}
