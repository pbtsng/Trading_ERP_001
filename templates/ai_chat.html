{% extends "base.html" %}
{% block content %}

<div class="row g-3">
  <div class="col-12 col-lg-8">
    <div class="card p-3">
      <h3>AI Trading Assistant</h3>
      <form class="ai-form mt-2" onsubmit="ask();return false;">
        <div class="row g-2">
          <div class="col-12 col-md-8">
            <input id="q" class="form-control" placeholder="Ask your question">
          </div>
          <div class="col-12 col-md-3">
            <select id="provider" class="form-select">
              <option value="auto" {% if default_provider=='auto' %}selected{% endif %}>Auto (OpenAI or Gemini)</option>
              <option value="openai" {% if default_provider=='openai' %}selected{% endif %}>OpenAI</option>
              <option value="gemini" {% if default_provider=='gemini' %}selected{% endif %}>Gemini</option>
            </select>
          </div>
          <div class="col-12 col-md-1 d-grid">
            <button type="submit" class="btn btn-primary">Ask</button>
          </div>
        </div>
      </form>
      <div class="mt-3">
        <h5>Answer</h5>
        <div id="ans"></div>
      </div>
      <div class="mt-3">
        <h6>Generated SQL</h6>
        <pre id="sql"></pre>
      </div>
    </div>
  </div>
</div>

<script>
function ask(){
    var q = document.getElementById("q").value;
    var provider = document.getElementById("provider").value;
    var body = "question="+encodeURIComponent(q)+"&provider="+encodeURIComponent(provider);
    fetch("/ask_ai",{
        method:"POST",
        headers:{"Content-Type":"application/x-www-form-urlencoded"},
        body: body
    })
    .then(function(r){return r.json()})
    .then(function(d){
        if(d.error){
            document.getElementById("ans").innerHTML = "<div class='text-danger'>"+d.error+"</div>";
            document.getElementById("sql").innerText = d.sql || "";
        }else{
            var label = "";
            if(d.provider){
                label = "<div class='text-muted small mb-2'>Provider: "+d.provider+"</div>";
            }
            document.getElementById("ans").innerHTML = label + d.answer;
            document.getElementById("sql").innerText = d.sql;
        }
    });
}
</script>

{% endblock %}
