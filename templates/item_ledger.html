{% extends "base.html" %}
{% block content %}

<h3>Item Ledger</h3>

<form method="get" class="row g-2 mb-3">
  <div class="col-12 col-md-4">
    <select name="item_id" class="form-control">
      <option value="">[Select Item]</option>
      {% for it in items %}
      <option value="{{ it[0] }}" {% if selected_item==it[0]|string %}selected{% endif %}>{{ it[1] }}</option>
      {% endfor %}
    </select>
  </div>
  <div class="col-12 col-md-2">
    <button class="btn btn-primary">View</button>
  </div>
  <div class="col-12 text-muted small">
    Movement recorded from supplier to customer via Loading Advice.
  </div>
</form>

<div class="table-responsive">
  <table class="table table-sm table-bordered">
    <thead>
      <tr>
        <th>Date</th>
        <th>Item</th>
        <th>Supplier</th>
        <th>Customer</th>
        <th>Qty</th>
        <th>SO</th>
        <th>PO</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td>{{ r[0] }}</td>
        <td>{{ r[1] }}</td>
        <td>{{ r[2] }}</td>
        <td>{{ r[3] }}</td>
        <td>{{ r[4] }}</td>
        <td>{{ r[5] }}</td>
        <td>{{ r[6] }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>

{% endblock %}
