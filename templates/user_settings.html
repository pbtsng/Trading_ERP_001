{% extends "base.html" %}
{% block content %}

<div class="page-heading">
  <h3>⚙️ User Settings</h3>
</div>

<form method="post" class="card p-3 col-md-6">
  <div class="form-check form-switch mb-3">
    <input class="form-check-input" type="checkbox" id="mfaRequired" name="mfa_required" value="1" {% if
      user.mfa_required %}checked{% endif %}>
    <label class="form-check-label" for="mfaRequired">Enable 2FA for this user</label>
  </div>

  <div class="mb-3">
    <label class="form-label">Default Theme</label>
    <select name="default_theme" class="form-select">
      <option value="">Use browser / last setting</option>
      <option value="light" {% if user.default_theme=='light' %}selected{% endif %}>Light</option>
      <option value="dark" {% if user.default_theme=='dark' %}selected{% endif %}>Dark</option>
    </select>
  </div>

  <div class="mb-3">
    <label class="form-label">Default View Density</label>
    <select name="default_density" class="form-select">
      <option value="">Use last setting</option>
      <option value="compact" {% if user.default_density=='compact' %}selected{% endif %}>Compact</option>
      <option value="comfortable" {% if user.default_density=='comfortable' %}selected{% endif %}>Comfortable</option>
    </select>
  </div>

  <button class="btn btn-primary">Save Settings</button>
</form>

{% endblock %}
